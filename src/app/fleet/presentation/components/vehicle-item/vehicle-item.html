<div class="vehicle-card" [class]="'vehicle-card--' + statusClass">
  <div class="vehicle-header">
    <div class="vehicle-plate">{{ vehicle.plate }}</div>
    <div [class]="'vehicle-status vehicle-status--' + statusClass">
      {{ statusLabel }}
    </div>
  </div>

  <div class="vehicle-body">
    <div class="vehicle-info">
      <span class="label">Marca:</span>
      <span class="value">{{ vehicle.brand }}</span>
    </div>
    <div class="vehicle-info">
      <span class="label">Modelo:</span>
      <span class="value">{{ vehicle.model }}</span>
    </div>
    <div class="vehicle-info">
      <span class="label">Capacidad:</span>
      <span class="value">{{ vehicle.capacity }} kg</span>
    </div>
  </div>

  <div class="vehicle-footer">
    <button class="btn-primary">Ver Detalles</button>
  </div>
</div>
